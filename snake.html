<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f23;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: monospace;
    color: #ccc;
  }
  .wrap { text-align: center; }
  h1 { color: #4ecdc4; margin-bottom: 8px; font-size: 24px; }
  #score { font-size: 16px; margin-bottom: 8px; }
  canvas { border: 2px solid #333; display: block; margin: 0 auto; }
  .hint { margin-top: 8px; font-size: 13px; color: #666; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Snake</h1>
  <p id="score">Score: 0</p>
  <canvas id="game" width="400" height="400"></canvas>
  <p class="hint">Arrow keys to move &middot; Space to pause &middot; R to restart</p>
</div>
<script>
(function () {
  var canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
  var grid = 20, cols = canvas.width / grid, rows = canvas.height / grid;
  var snake, dir, food, score, speed, interval, paused, gameOver;

  function init() {
    snake = [{ x: Math.floor(cols / 2), y: Math.floor(rows / 2) }];
    dir = { x: 1, y: 0 };
    food = null; score = 0; speed = 120; paused = false; gameOver = false;
    placeFood(); updateScore();
    if (interval) clearInterval(interval);
    interval = setInterval(tick, speed);
  }

  function placeFood() {
    do {
      food = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
    } while (snake.some(function (s) { return s.x === food.x && s.y === food.y; }));
  }

  function updateScore() {
    document.getElementById("score").textContent = "Score: " + score;
  }

  function tick() {
    if (paused || gameOver) return;
    var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows ||
        snake.some(function (s) { return s.x === head.x && s.y === head.y; })) {
      gameOver = true; clearInterval(interval); draw(); return;
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10; updateScore(); placeFood();
      if (speed > 60) { speed -= 2; clearInterval(interval); interval = setInterval(tick, speed); }
    } else { snake.pop(); }
    draw();
  }

  function draw() {
    ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ff6b6b"; ctx.beginPath();
    ctx.arc(food.x * grid + grid / 2, food.y * grid + grid / 2, grid / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
    for (var i = 0; i < snake.length; i++) {
      ctx.fillStyle = i === 0 ? "#4ecdc4" : "#45b7aa";
      ctx.fillRect(snake[i].x * grid + 1, snake[i].y * grid + 1, grid - 2, grid - 2);
      ctx.fillStyle = "#3a9e94";
      ctx.fillRect(snake[i].x * grid + 3, snake[i].y * grid + 3, grid - 6, grid - 6);
    }
    if (gameOver) {
      ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ff6b6b"; ctx.font = "bold 30px monospace"; ctx.textAlign = "center";
      ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
      ctx.fillStyle = "#ccc"; ctx.font = "16px monospace";
      ctx.fillText("Score: " + score, canvas.width / 2, canvas.height / 2 + 20);
      ctx.fillText("Press R to restart", canvas.width / 2, canvas.height / 2 + 45);
    }
    if (paused && !gameOver) {
      ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fff"; ctx.font = "bold 24px monospace"; ctx.textAlign = "center";
      ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2);
    }
  }

  document.addEventListener("keydown", function (e) {
    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " ", "r", "R"].indexOf(e.key) !== -1) e.preventDefault();
    if (e.key === "r" || e.key === "R") { init(); return; }
    if (e.key === " ") { paused = !paused; draw(); return; }
    if (gameOver || paused) return;
    if (e.key === "ArrowUp" && dir.y === 0) dir = { x: 0, y: -1 };
    else if (e.key === "ArrowDown" && dir.y === 0) dir = { x: 0, y: 1 };
    else if (e.key === "ArrowLeft" && dir.x === 0) dir = { x: -1, y: 0 };
    else if (e.key === "ArrowRight" && dir.x === 0) dir = { x: 1, y: 0 };
  });

  init();
})();
</script>
</body>
</html>
